<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PolyData</title>
    <style>
        :root {
            --paper: #f7f1e8;
            --ink: #1f2a2a;
            --muted: #5b6765;
            --accent: #0f766e;
            --accent-dark: #0a4f4a;
            --line: rgba(31, 42, 42, 0.12);
            --card: rgba(255, 252, 247, 0.84);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 28%),
                radial-gradient(circle at 85% 15%, rgba(234, 179, 8, 0.16), transparent 24%),
                linear-gradient(180deg, #fbf6ef 0%, var(--paper) 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1120px, calc(100vw - 32px));
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0;
        }

        .brand {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .nav a {
            padding: 10px 14px;
            border-radius: 999px;
            color: var(--muted);
        }

        .nav a:hover {
            color: var(--ink);
            background: rgba(255, 255, 255, 0.5);
        }

        .hero {
            padding: 56px 0 88px;
        }

        .hero-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: clamp(28px, 5vw, 56px);
            box-shadow: 0 24px 80px rgba(31, 42, 42, 0.08);
            backdrop-filter: blur(8px);
        }

        .eyebrow {
            margin: 0 0 14px;
            color: var(--accent-dark);
            font-size: 0.82rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            max-width: 12ch;
            font-size: clamp(3rem, 9vw, 6.2rem);
            line-height: 0.94;
            font-weight: 600;
        }

        .subtitle {
            margin: 18px 0 0;
            max-width: 56ch;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-top: 30px;
        }

        .search-input {
            width: 100%;
            border: 1px solid rgba(15, 118, 110, 0.22);
            border-radius: 18px;
            padding: 18px 20px;
            font: inherit;
            font-size: 1rem;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.86);
        }

        .search-input:focus {
            outline: 2px solid rgba(15, 118, 110, 0.28);
            border-color: rgba(15, 118, 110, 0.42);
        }

        .search-button {
            border: 0;
            border-radius: 18px;
            padding: 0 22px;
            min-height: 58px;
            font: inherit;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            cursor: pointer;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.56);
            color: var(--muted);
            font-size: 0.95rem;
        }
        .pill:hover {
            color: var(--ink);
            background: rgba(255, 255, 255, 0.82);
        }

        @media (max-width: 720px) {
            .header {
                flex-direction: column;
                gap: 14px;
                align-items: flex-start;
            }

            .search-form {
                grid-template-columns: 1fr;
            }

            .search-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="header">
            <a class="brand" href="/">PolyData</a>
            <nav class="nav" aria-label="Primary navigation">
                <a href="/datasets/">Datasets</a>
                <a href="/organizations/">Organizations</a>
                <a href="/api/">API</a>
                <a href="/api/schema/swagger-ui/">Swagger</a>
            </nav>
        </header>

        <main class="hero">
            <section class="hero-card">
                <p class="eyebrow">Open Data Catalog</p>
                <h1>Find datasets fast.</h1>
                <p class="subtitle">
                    A minimal entry point to browse datasets, inspect organizations, and jump into the API without extra navigation.
                </p>

                <form class="search-form" action="/datasets/" method="get">
                    <input
                        class="search-input"
                        type="search"
                        name="search"
                        value="{{ search_query }}"
                        placeholder="Search datasets by title"
                        aria-label="Search datasets"
                    >
                    <button class="search-button" type="submit">Search</button>
                </form>

                <div class="meta" aria-label="Catalog summary">
                    <a class="pill" href="/datasets/">{{ dataset_count }} datasets</a>
                    <a class="pill" href="/organizations/">{{ organization_count }} organizations</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
