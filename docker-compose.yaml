services:
  database:
    image: paradedb/paradedb:latest
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - database:/var/lib/postgresql
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - django-liberty
  backend:
    build:
      context: backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')",
        ]
      interval: 2s
      timeout: 2s
      retries: 10
    depends_on:
      database:
        condition: service_healthy
    networks:
      - django-liberty
  frontend:
    build:
      context: frontend
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      NUXT_URL: http://127.0.0.1:8000
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:3000/').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 2s
      timeout: 2s
      retries: 10
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - django-liberty

  valkey:
    image: valkey/valkey:latest
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
    networks:
      - django-liberty

networks:
  django-liberty:
    driver: bridge

volumes:
  backend:
  database:
  frontend:
